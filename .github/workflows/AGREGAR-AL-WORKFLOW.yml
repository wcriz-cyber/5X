# FRAGMENTO PARA AGREGAR EN TU .github/workflows/build-apk.yml
# Pégalo ANTES del paso "npx cap build android" o "./gradlew"
# ════════════════════════════════════════════════════════════

      # ── Instalar ImageMagick para generar íconos ─────────────
      - name: Install ImageMagick
        run: sudo apt-get install -y imagemagick

      # ── Generar íconos Android desde icon.png del repo ───────
      - name: Fix Android launcher icon
        run: |
          chmod +x fix-android-icon.sh
          ./fix-android-icon.sh

      # ── (Continúa con tu build habitual) ─────────────────────
