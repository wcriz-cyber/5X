name: 🤖 Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:   # permite lanzar manualmente desde GitHub UI

jobs:
  build-apk:
    name: Compilar APK
    runs-on: ubuntu-latest

    steps:
      # 1 — Descargar el repo
      - name: Checkout código
        uses: actions/checkout@v4

      # 2 — Node.js 20
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 3 — Java 17 (requerido por Gradle/Android)
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 4 — Android SDK
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # 5 — Instalar dependencias npm + FCM plugin
      - name: Instalar dependencias
        run: |
          npm install
          npm install @capacitor/push-notifications@latest --save
          echo "✅ Dependencias instaladas incluyendo FCM"

      # 6 — Copiar assets web a www/
      - name: Preparar assets web (www/)
        run: |
          mkdir -p www
          cp index.html www/index.html
          [ -f sw.js ] && cp sw.js www/sw.js || echo "⚠️ sw.js no encontrado, se omite"
          [ -f icon.png ] && cp icon.png www/icon.png || echo "⚠️ icon.png no encontrado en raíz"
          echo "✅ www/ listo:"
          ls -la www/

      # 7 — Generar íconos Android
      - name: Generar íconos Android
        run: |
          mkdir -p resources
          if [ -f www/icon.png ]; then
            # Verificar dimensiones mínimas 1024x1024
            SIZE=$(python3 -c "
          import struct, zlib
          with open('www/icon.png','rb') as f:
              f.read(8)
              f.read(4)
              assert f.read(4) == b'IHDR'
              w,h = struct.unpack('>II', f.read(8))
              print(f'{w}x{h}')
          " 2>/dev/null || echo "unknown")
            echo "📐 Dimensiones del icono: $SIZE"
            if [ "$SIZE" != "1024x1024" ]; then
              echo "⚠️ Se recomienda icon.png de 1024x1024px para mejor calidad"
            fi
            cp www/icon.png resources/icon.png
            npx @capacitor/assets generate --android
            echo "✅ Íconos Android generados"
          else
            echo "❌ ERROR: icon.png no encontrado — no se pueden generar íconos"
            exit 1
          fi

      # 8 — Inyectar google-services.json desde GitHub Secret (seguro)
      - name: Crear google-services.json desde Secret
        run: |
          if [ -z "${{ secrets.GOOGLE_SERVICES_JSON }}" ]; then
            echo "❌ ERROR: Secret GOOGLE_SERVICES_JSON no configurado"
            echo "   → Ve a Settings → Secrets → Actions → New repository secret"
            echo "   → Nombre: GOOGLE_SERVICES_JSON"
            echo "   → Valor: contenido completo del archivo google-services.json"
            exit 1
          fi
          echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > android/app/google-services.json
          PROJECT=$(python3 -c "import json,sys; d=json.load(open('android/app/google-services.json')); print(d['project_info']['project_id'])")
          echo "✅ google-services.json creado — Proyecto Firebase: $PROJECT"

      # 9 — Parchear android/build.gradle para google-services
      - name: Parchear android/build.gradle (google-services)
        run: |
          GRADLE=android/build.gradle
          if grep -q "com.google.gms:google-services" "$GRADLE"; then
            echo "✅ google-services ya presente en $GRADLE"
          else
            sed -i '/buildscript {/,/^}/ {
              /dependencies {/ a\        classpath '\''com.google.gms:google-services:4.4.1'\''
            }' "$GRADLE"
            echo "✅ google-services classpath añadido a $GRADLE"
          fi
          cat "$GRADLE"

      # 10 — Parchear android/app/build.gradle para aplicar plugin google-services
      - name: Parchear android/app/build.gradle (apply plugin)
        run: |
          GRADLE=android/app/build.gradle
          if grep -q "com.google.gms.google-services" "$GRADLE"; then
            echo "✅ plugin google-services ya presente en $GRADLE"
          else
            echo "" >> "$GRADLE"
            echo "apply plugin: 'com.google.gms.google-services'" >> "$GRADLE"
            echo "✅ plugin google-services añadido a $GRADLE"
          fi
          tail -5 "$GRADLE"

      # 11 — Cache de Gradle (acelera builds ~3-5 min)
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            android/.gradle
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      # 12 — Sincronizar assets web con Android (incluye FCM plugin)
      - name: Sincronizar assets web con Android
        run: npx cap sync android

      # 13 — Compilar APK debug
      - name: Compilar APK
        working-directory: android
        run: chmod +x gradlew && ./gradlew assembleDebug --stacktrace

      # 14 — Subir APK como artifact descargable
      - name: Publicar APK
        uses: actions/upload-artifact@v4
        with:
          name: 5X-Trading-FCM-v${{ github.run_number }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      # 15 — Info del APK
      - name: Info APK
        run: |
          APK=android/app/build/outputs/apk/debug/app-debug.apk
          if [ -f "$APK" ]; then
            SIZE=$(du -sh $APK | cut -f1)
            echo "✅ APK con FCM compilado exitosamente"
            echo "📦 Tamaño: $SIZE"
            echo "📥 Descárgalo en: Actions → este workflow → Artifacts"
          else
            echo "❌ APK no encontrado en la ruta esperada"
            exit 1
          fi
