name: 🤖 Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:   # permite lanzar manualmente desde GitHub UI

jobs:
  build-apk:
    name: Compilar APK
    runs-on: ubuntu-latest

    steps:
      # 1 — Descargar el repo
      - name: Checkout código
        uses: actions/checkout@v4

      # 2 — Node.js 20
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 3 — Java 17 (requerido por Gradle/Android)
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 4 — Android SDK
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # 5 — Instalar dependencias npm (Capacitor)
      - name: Instalar dependencias
        run: npm ci

      # 6 — ✅ GENERAR ÍCONOS ANDROID DESDE icon.png DEL REPO
      #     @capacitor/assets lee resources/icon.png (512×512) y genera
      #     todos los mipmap-* (mdpi/hdpi/xhdpi/xxhdpi/xxxhdpi) automáticamente.
      #     Sin este paso Capacitor usa su ícono de muestra por defecto.
      - name: Generar íconos Android
        run: |
          # Crear carpeta resources/ y copiar icon.png desde www/
          mkdir -p resources/android
          if [ -f "www/icon.png" ]; then
            cp www/icon.png resources/icon.png
            echo "✅ Usando www/icon.png"
          elif [ -f "icon.png" ]; then
            cp icon.png resources/icon.png
            echo "✅ Usando icon.png (raíz)"
          else
            echo "❌ No se encontró icon.png en www/ ni en la raíz"
            exit 1
          fi
          # Generar todos los tamaños de ícono para Android
          npx @capacitor/assets generate --android

      # 7 — Copiar assets web → carpeta android
      - name: Sincronizar assets web con Android
        run: npx cap sync android

      # 8 — Compilar APK debug (instalable directamente)
      - name: Compilar APK
        working-directory: android
        run: chmod +x gradlew && ./gradlew assembleDebug --stacktrace

      # 9 — Subir APK como artifact descargable
      - name: Publicar APK
        uses: actions/upload-artifact@v4
        with:
          name: 5X-Trading-v${{ github.run_number }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      # 10 — Mostrar info del APK
      - name: Info APK
        run: |
          APK=android/app/build/outputs/apk/debug/app-debug.apk
          SIZE=$(du -sh $APK | cut -f1)
          echo "✅ APK compilado exitosamente"
          echo "📦 Tamaño: $SIZE"
          echo "📥 Descárgalo en: Actions → este workflow → Artifacts"
