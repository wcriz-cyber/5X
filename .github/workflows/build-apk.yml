name: 🤖 Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:   # permite lanzar manualmente desde GitHub UI

jobs:
  build-apk:
    name: Compilar APK
    runs-on: ubuntu-latest

    steps:
      # 1 — Descargar el repo
      - name: Checkout código
        uses: actions/checkout@v4

      # 2 — Node.js 20
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 3 — Java 17 (requerido por Gradle/Android)
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 4 — Android SDK
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # 5 — Instalar dependencias npm (Capacitor)
      - name: Instalar dependencias
        run: npm ci

      # 6 — ✅ Copiar assets web a www/ (Capacitor espera webDir:"www")
      #     index.html y sw.js deben estar en www/ antes del sync
      - name: Preparar assets web (www/)
        run: |
          mkdir -p www
          # Copiar archivos principales
          cp index.html www/index.html
          cp sw.js www/sw.js
          # Copiar icon.png si existe en la raíz
          [ -f icon.png ] && cp icon.png www/icon.png
          echo "✅ www/ listo:"
          ls -la www/

      # 7 — ✅ GENERAR ÍCONOS ANDROID DESDE icon.png DEL REPO
      #     @capacitor/assets genera mipmap-* automáticamente desde resources/icon.png
      - name: Generar íconos Android
        run: |
          mkdir -p resources
          cp www/icon.png resources/icon.png
          npx @capacitor/assets generate --android
          echo "✅ Íconos Android generados"

      # 8 — Sincronizar assets web con Android
      - name: Sincronizar assets web con Android
        run: npx cap sync android

      # 9 — Compilar APK debug (instalable directamente)
      - name: Compilar APK
        working-directory: android
        run: chmod +x gradlew && ./gradlew assembleDebug --stacktrace

      # 10 — Subir APK como artifact descargable
      - name: Publicar APK
        uses: actions/upload-artifact@v4
        with:
          name: 5X-Trading-v${{ github.run_number }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      # 11 — Mostrar info del APK
      - name: Info APK
        run: |
          APK=android/app/build/outputs/apk/debug/app-debug.apk
          SIZE=$(du -sh $APK | cut -f1)
          echo "✅ APK compilado exitosamente"
          echo "📦 Tamaño: $SIZE"
          echo "📥 Descárgalo en: Actions → este workflow → Artifacts"
